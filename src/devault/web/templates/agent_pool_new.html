{% extends "base.html" %}
{% block title %}New Agent pool · DeVault{% endblock %}
{% block body %}
<h1>New Agent pool</h1>
<p><a href="/ui/agent-pools">← Agent pools</a></p>
{% if error %}<p class="flash err">{{ error }}</p>{% endif %}
<form method="post" action="/ui/agent-pools/new">
  <fieldset {% if not auth_ctx.can_write() %}disabled="disabled"{% endif %}>
  <p>
    <label for="name">Pool name</label><br/>
    <input type="text" id="name" name="name" required style="width:100%;max-width:420px;" placeholder="e.g. prod-backup-pool"/>
  </p>
  <p><button type="submit">Create</button></p>
  </fieldset>
</form>
{% endblock %}
