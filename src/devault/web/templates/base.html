<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}DeVault{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 1rem auto; padding: 0 0.75rem; }
    nav a { margin-right: 1rem; }
    table { border-collapse: collapse; width: 100%; font-size: 14px; }
    th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: left; vertical-align: top; }
    th { background: #f4f4f4; }
    code { font-size: 12px; word-break: break-all; }
    .muted { color: #555; font-size: 13px; }
    .flash { padding: 10px 12px; border-radius: 6px; margin: 0 0 1rem; }
    .flash.ok { background: #e8f5e9; border: 1px solid #81c784; }
    .flash.err { background: #ffebee; border: 1px solid #e57373; }
    form.inline { display: inline; }
    button, .btn { cursor: pointer; padding: 4px 10px; font-size: 13px; }
    input[type=text], input[type=password], textarea, select { font-size: 13px; padding: 4px 8px; max-width: 100%; }
    textarea { width: 100%; min-height: 100px; font-family: ui-monospace, monospace; }
    .row-actions { white-space: nowrap; }
    label { margin-right: 0.75rem; }
  </style>
</head>
<body>
  <nav>
    <a href="/ui/agents">Agents</a>
    <a href="/ui/jobs">Jobs</a>
    <a href="/ui/artifacts">Artifacts</a>
    <a href="/ui/policies">Policies</a>
    <a href="/ui/schedules">Schedules</a>
    <a href="/docs">Swagger UI</a>
    <a href="/metrics">Metrics</a>
  </nav>
  <hr/>
  {% block body %}{% endblock %}
</body>
</html>
