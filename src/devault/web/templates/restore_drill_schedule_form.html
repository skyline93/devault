{% extends "base.html" %}
{% block title %}{{ heading }} · DeVault{% endblock %}
{% block body %}
<h1>{{ heading }}</h1>
<p><a href="/ui/restore-drill-schedules">← Restore drill schedules</a></p>
<form method="post" action="{% if schedule %}/ui/restore-drill-schedules/{{ schedule.id }}/edit{% else %}/ui/restore-drill-schedules/new{% endif %}">
  {% if artifacts %}
  <p>
    <label for="artifact_id">Artifact</label><br/>
    <select name="artifact_id" id="artifact_id" required>
      {% for a in artifacts %}
      <option value="{{ a.id }}" {% if schedule and schedule.artifact_id == a.id %}selected{% endif %}>
        {{ a.id }} (job {{ a.job_id }}, {{ a.size_bytes }} bytes)
      </option>
      {% endfor %}
    </select>
  </p>
  {% else %}
  <p class="flash err">No artifacts. Run a backup first.</p>
  {% endif %}
  <p>
    <label for="drill_base_path">Drill base path (absolute on Agent)</label><br/>
    <input type="text" id="drill_base_path" name="drill_base_path" required style="width:100%;max-width:520px;"
           placeholder="/restore/drills"
           value="{{ schedule.drill_base_path if schedule else '' }}"/>
  </p>
  <p>
    <label for="cron_expression">Cron expression</label><br/>
    <input type="text" id="cron_expression" name="cron_expression" required style="width:100%;max-width:400px;"
           placeholder="0 3 * * 0"
           value="{{ schedule.cron_expression if schedule else '' }}"/>
  </p>
  <p>
    <label for="timezone">Time zone</label><br/>
    <input type="text" id="timezone" name="timezone" style="width:100%;max-width:240px;"
           value="{{ schedule.timezone if schedule else 'UTC' }}"/>
  </p>
  <p>
    <span>Enabled</span><br/>
    <label><input type="radio" name="enabled" value="yes" {% if not schedule or schedule.enabled %}checked{% endif %}/> Yes</label>
    <label><input type="radio" name="enabled" value="no" {% if schedule and not schedule.enabled %}checked{% endif %}/> No</label>
  </p>
  <p>{% if artifacts %}<button type="submit">{% if schedule %}Save{% else %}Create{% endif %}</button>{% endif %}</p>
</form>
{% endblock %}
