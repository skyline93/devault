name: E2E version matrix

on:
  workflow_dispatch:
  schedule:
    # 每周一 07:00 UTC：多版本 Compose + gRPC 冒烟（与 docs/compatibility.json · ci_e2e 对齐）
    - cron: "0 7 * * 1"

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: plan
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/ci_e2e_matrix_plan.py

  e2e:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    env:
      DEVAULT_E2E_CP_IMAGE: devault-e2e-cp:local
      DEVAULT_E2E_AGENT_IMAGE: devault-e2e-agent:local
      DEVAULT_E2E_REGISTRATION_SECRET: devault-docker-register-secret
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout control plane build context
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ matrix.cp_ref }}
          path: e2e-build/cp
          fetch-depth: 0

      - name: Checkout agent build context
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ matrix.agent_ref }}
          path: e2e-build/agent
          fetch-depth: 0

      - name: Build images
        run: |
          set -eux
          if [ "${{ matrix.cp_ref }}" = "${{ matrix.agent_ref }}" ]; then
            docker build -t "$DEVAULT_E2E_CP_IMAGE" -f deploy/Dockerfile e2e-build/cp
            docker tag "$DEVAULT_E2E_CP_IMAGE" "$DEVAULT_E2E_AGENT_IMAGE"
          else
            docker build -t "$DEVAULT_E2E_CP_IMAGE" -f deploy/Dockerfile e2e-build/cp
            docker build -t "$DEVAULT_E2E_AGENT_IMAGE" -f deploy/Dockerfile e2e-build/agent
          fi

      - name: Compose up (pre-built images)
        working-directory: ${{ github.workspace }}
        run: |
          set -eux
          docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.e2e-matrix.override.yml \
            up -d --no-build --wait --wait-timeout 300

      - name: Install Python client (host smoke uses repo protobufs)
        run: pip install -e ".[dev]"

      - name: gRPC smoke from host (published :50051)
        env:
          DEVAULT_E2E_GRPC_TARGET: 127.0.0.1:50051
        run: python scripts/e2e_grpc_register_heartbeat.py

      - name: Copy smoke script into agent container and run (matrix agent image)
        run: |
          set -eux
          aid="$(docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.e2e-matrix.override.yml ps -q agent)"
          docker cp scripts/e2e_grpc_register_heartbeat.py "$aid":/tmp/e2e_grpc_register_heartbeat.py
          docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.e2e-matrix.override.yml exec -T \
            -e DEVAULT_E2E_GRPC_TARGET=api:50051 \
            agent python /tmp/e2e_grpc_register_heartbeat.py

      - name: Compose down
        if: always()
        run: |
          docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.e2e-matrix.override.yml down -v --remove-orphans || true
