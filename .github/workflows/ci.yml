name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  iam-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: devault
          POSTGRES_PASSWORD: devault
          POSTGRES_DB: devault
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devault -d devault"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install IAM package
        run: pip install -e "./iam[dev]"
      - name: Alembic upgrade (IAM)
        working-directory: iam
        env:
          IAM_DATABASE_URL: postgresql+psycopg://devault:devault@127.0.0.1:5432/devault
        run: alembic upgrade head
      - name: Pytest (IAM)
        working-directory: iam
        env:
          IAM_TEST_DATABASE_URL: postgresql+psycopg://devault:devault@127.0.0.1:5432/devault
        run: pytest -q

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Helm lint & template
        run: |
          helm lint deploy/helm/devault
          helm template helm-ci deploy/helm/devault >/dev/null
          helm template helm-ci-mon deploy/helm/devault --set monitoring.enabled=true >/dev/null

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [full, compatibility]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Verify release docs (version ↔ CHANGELOG)
        run: python scripts/verify_release_docs.py

      - name: Verify compatibility matrix JSON
        run: python scripts/verify_compatibility_matrix.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Export OpenAPI + contract gate + console build (十五-02 / 十五-19)
        run: |
          python scripts/export_openapi_json.py -o console/openapi.json
          python scripts/verify_console_openapi_contract.py console/openapi.json
          cd console && npm ci && npm run codegen && npm run build

      - name: Pytest (full)
        if: matrix.suite == 'full'
        run: pytest -q

      - name: Pytest (compatibility slice)
        if: matrix.suite == 'compatibility'
        run: >
          pytest -q
          tests/test_proto_contracts.py
          tests/test_agent_version_gate.py
          tests/test_verify_compatibility_matrix.py
          tests/test_openapi_jobs_list_filters.py
