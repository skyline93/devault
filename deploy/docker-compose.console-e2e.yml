# Playwright 控制台冒烟（十五-22）：从仓库根构建 API + console，不启 agent/scheduler。
# 用法（仓库根或 deploy/）：
#   export COMPOSE_PROJECT_NAME=devault-console-e2e
#   docker compose -f deploy/docker-compose.console-e2e.yml up -d --build
# 默认 Token 与主 compose 一致：**DEVAULT_API_TOKEN=changeme**；控制台 **http://127.0.0.1:8080/**

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: devault
      POSTGRES_PASSWORD: devault
      POSTGRES_DB: devault
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devault -d devault"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      DEVAULT_S3_BUCKET: ${DEVAULT_S3_BUCKET:-devault}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        i=0
        while [ "$$i" -lt 60 ]; do
          mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" && break
          i=$$((i+1))
          sleep 1
        done
        mc mb --ignore-existing "local/$$DEVAULT_S3_BUCKET"
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             uvicorn devault.api.main:app --host 0.0.0.0 --port 8000"
    environment:
      DEVAULT_DATABASE_URL: postgresql+psycopg://devault:devault@postgres:5432/devault
      DEVAULT_REDIS_URL: redis://redis:6379/0
      DEVAULT_API_TOKEN: ${DEVAULT_API_TOKEN:-changeme}
      DEVAULT_CONSOLE_SELF_REGISTRATION_ENABLED: ${DEVAULT_CONSOLE_SELF_REGISTRATION_ENABLED:-true}
      DEVAULT_GRPC_REGISTRATION_SECRET: ${DEVAULT_GRPC_REGISTRATION_SECRET:-devault-docker-register-secret}
      DEVAULT_STORAGE_BACKEND: s3
      DEVAULT_S3_ENDPOINT: ${DEVAULT_S3_ENDPOINT:-http://minio:9000}
      DEVAULT_S3_ACCESS_KEY: minioadmin
      DEVAULT_S3_SECRET_KEY: minioadmin
      DEVAULT_S3_BUCKET: ${DEVAULT_S3_BUCKET:-devault}
      DEVAULT_S3_USE_SSL: "false"
      DEVAULT_ENV_NAME: dev
      DEVAULT_GRPC_LISTEN: 0.0.0.0:50051
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/healthz'', timeout=4).read()"',
        ]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 120s

  console:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.console
    image: ${DEVAULT_CONSOLE_IMAGE:-devault-console:e2e}
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  miniodata: {}
