# TLS termination for Agent gRPC: clients use HTTPS/HTTP2; upstream to api:50051 is plaintext h2c.
# Generate certs: `bash scripts/gen_grpc_dev_tls.sh` (writes deploy/tls/dev/).
static_resources:
  listeners:
    - name: listener_grpc_tls
      address:
        socket_address: { address: 0.0.0.0, port_value: 50052 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_grpc
                codec_type: HTTP2
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: devault_grpc
                            timeout: 0s
                            max_stream_duration:
                              grpc_timeout_header_max: 0s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                http2_protocol_options: {}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                # gRPC clients (e.g. Python grpc.secure_channel) require ALPN to negotiate h2.
                alpn_protocols: ["h2", "http/1.1"]
                tls_certificates:
                  - certificate_chain: { filename: "/etc/ssl/grpc/server.crt" }
                    private_key: { filename: "/etc/ssl/grpc/server.key" }
  clusters:
    - name: devault_grpc
      type: STRICT_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      http2_protocol_options: {}
      load_assignment:
        cluster_name: devault_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: api, port_value: 50051 }

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }
