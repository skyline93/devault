# DeVault demo / lab: route all alerts to the webhook receiver (Compose profile with-monitoring in docker-compose.yml).
# Replace `receivers.demo.webhook_configs` with Slack / PagerDuty / email in production.

global:
  resolve_timeout: 5m

route:
  receiver: demo
  group_by: ["alertname", "severity"]
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    - matchers:
        - severity="critical"
      receiver: demo
      group_wait: 10s
      repeat_interval: 4h

receivers:
  - name: demo
    webhook_configs:
      - url: http://alertdump:8080/
        send_resolved: true

inhibit_rules: []
