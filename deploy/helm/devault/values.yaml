# Default values for a single-namespace demo / lab install.
# For production: disable bundled Postgres/Redis/MinIO and point devault.* at managed services.

nameOverride: ""
fullnameOverride: ""

image:
  repository: glf9832/devault
  tag: latest
  pullPolicy: IfNotPresent

api:
  replicas: 1
  resources: {}
  podAnnotations: {}

scheduler:
  resources: {}
  podAnnotations: {}

agent:
  enabled: false
  replicas: 1
  allowedPathPrefixes: /data,/restore
  resources: {}
  podAnnotations: {}

# Ant Design Pro 静态 + nginx 反代 API（十五-21）。镜像由仓库根 `deploy/Dockerfile.console` 构建并推送到仓库。
# 启用后 Ingress 在同 host 上将 `/api` 等与 OpenAPI 同源路径指向 API，其余指向 console。
console:
  enabled: false
  image:
    repository: glf9832/devault-console
    tag: latest
    pullPolicy: IfNotPresent
  resources: {}
  # 可选：同源 ``/iam-api`` 反代到 IAM 的 ``host:port``（如集群内 ``{{ release }}-iam:8100``）。留空则不生成该 location。
  iamUpstream: ""

postgresql:
  enabled: true
  image: postgres:16-alpine
  storageClass: ""
  size: 10Gi
  auth:
    username: devault
    password: devault
    database: devault

redis:
  enabled: true
  image: redis:7-alpine

minio:
  enabled: true
  image: minio/minio:latest
  mcImage: minio/mc:latest
  storageClass: ""
  size: 20Gi
  rootUser: minioadmin
  rootPassword: minioadmin
  # Reference name for docs / future hooks; not injected into api/scheduler (create bucket + profile manually).
  bucket: devault

secrets:
  # Override in production (e.g. helm --set-file, SealedSecrets, ExternalSecrets).
  grpcRegistrationSecret: devault-helm-register-secret
  # Fernet key for encrypting storage profile static credentials at rest (must match across api/scheduler).
  storageConfigMasterKey: W6G1v87JXm6Q3J8Iyo7ACkH3vDXqCfuT6ItcL47UEzI=

devault:
  # When postgresql.enabled is false, set a full SQLAlchemy URL (e.g. managed RDS).
  databaseUrl: ""
  envName: dev
  retentionCleanupEnabled: "true"
  retentionCleanupIntervalSeconds: "900"
  # Optional artifact encryption key for Agent (Base64-32-bytes); demo default only.
  artifactEncryptionKey: ""

service:
  api:
    type: ClusterIP
    httpPort: 8000
    grpcPort: 50051

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: devault.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Optional in-cluster Prometheus + Alertmanager + demo webhook echo (ClusterIP only).
# Chart bundles `prometheus-alerts.yml` (sync with deploy/prometheus/alerts.yml when rules change).
monitoring:
  enabled: false
  prometheus:
    image: prom/prometheus:v2.55.1
    resources: {}
  alertmanager:
    image: prom/alertmanager:v0.27.0
  alertdump:
    image: mendhak/http-https-echo:35
