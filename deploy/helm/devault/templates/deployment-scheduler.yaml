{{- if not .Values.redis.enabled }}{{ fail "redis.enabled must be true for the bundled Helm chart" }}{{- end }}
{{- if not .Values.minio.enabled }}{{ fail "minio.enabled must be true for the bundled Helm chart" }}{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devault.fullname" . }}-scheduler
  labels:
    {{- include "devault.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "devault.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        {{- include "devault.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: scheduler
      {{- with .Values.scheduler.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      initContainers:
        {{- if .Values.postgresql.enabled }}
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ include "devault.postgresHost" . }} 5432; do sleep 2; done
        {{- end }}
        - name: wait-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ include "devault.redisHost" . }} 6379; do sleep 2; done
        - name: wait-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 180); do
                if wget -q -O- "http://{{ include "devault.fullname" . }}-api:8000/healthz" >/dev/null 2>&1; then
                  exit 0
                fi
                sleep 2
              done
              exit 1
      containers:
        - name: scheduler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - devault-scheduler
          env:
            - name: PYTHONPATH
              value: /app/src
            - name: DEVAULT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "devault.fullname" . }}-app
                  key: DEVAULT_DATABASE_URL
            - name: DEVAULT_REDIS_URL
              value: redis://{{ include "devault.redisHost" . }}:6379/0
            - name: DEVAULT_ENV_NAME
              value: {{ .Values.devault.envName | quote }}
            - name: DEVAULT_RETENTION_CLEANUP_ENABLED
              value: {{ .Values.devault.retentionCleanupEnabled | quote }}
            - name: DEVAULT_RETENTION_CLEANUP_INTERVAL_SECONDS
              value: {{ .Values.devault.retentionCleanupIntervalSeconds | quote }}
            - name: DEVAULT_STORAGE_CONFIG_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "devault.fullname" . }}-app
                  key: DEVAULT_STORAGE_CONFIG_MASTER_KEY
          {{- with .Values.scheduler.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
