{{- if .Values.console.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devault.fullname" . }}-console-nginx
  labels:
    {{- include "devault.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/css application/javascript application/json;

        location /api/ {
            proxy_pass http://{{ include "devault.fullname" . }}-api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /openapi.json {
            proxy_pass http://{{ include "devault.fullname" . }}-api:8000/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /docs {
            proxy_pass http://{{ include "devault.fullname" . }}-api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://{{ include "devault.fullname" . }}-api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /metrics {
            proxy_pass http://{{ include "devault.fullname" . }}-api:8000/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /version {
            proxy_pass http://{{ include "devault.fullname" . }}-api:8000/version;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /healthz {
            proxy_pass http://{{ include "devault.fullname" . }}-api:8000/healthz;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
{{- end }}
