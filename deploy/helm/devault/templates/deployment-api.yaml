{{- if not .Values.redis.enabled }}{{ fail "redis.enabled must be true for the bundled Helm chart" }}{{- end }}
{{- if not .Values.minio.enabled }}{{ fail "minio.enabled must be true for the bundled Helm chart" }}{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devault.fullname" . }}-api
  labels:
    {{- include "devault.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "devault.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "devault.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- $waitPg := .Values.postgresql.enabled }}
      {{- $waitRedis := .Values.redis.enabled }}
      {{- $waitMinio := .Values.minio.enabled }}
      {{- if or $waitPg $waitRedis $waitMinio }}
      initContainers:
        {{- if $waitPg }}
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ include "devault.postgresHost" . }} 5432; do sleep 2; done
        {{- end }}
        {{- if $waitRedis }}
        - name: wait-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ include "devault.redisHost" . }} 6379; do sleep 2; done
        {{- end }}
        {{- if $waitMinio }}
        - name: minio-bootstrap
          image: {{ .Values.minio.mcImage | quote }}
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.rootPassword | quote }}
            - name: DEVAULT_S3_BUCKET
              value: {{ .Values.minio.bucket | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              i=0
              while [ "$i" -lt 120 ]; do
                mc alias set local http://{{ include "devault.minioHost" . }}:9000 \
                  "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" && break
                i=$((i+1))
                sleep 1
              done
              mc mb --ignore-existing "local/$DEVAULT_S3_BUCKET"
        {{- end }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              alembic upgrade head
              exec uvicorn devault.api.main:app --host 0.0.0.0 --port 8000
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 50051
          env:
            - name: PYTHONPATH
              value: /app/src
            - name: DEVAULT_REDIS_URL
              value: redis://{{ include "devault.redisHost" . }}:6379/0
            - name: DEVAULT_STORAGE_BACKEND
              value: "s3"
            - name: DEVAULT_S3_ENDPOINT
              value: http://{{ include "devault.minioHost" . }}:9000
            - name: DEVAULT_S3_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            - name: DEVAULT_S3_USE_SSL
              value: "false"
            - name: DEVAULT_ENV_NAME
              value: {{ .Values.devault.envName | quote }}
            - name: DEVAULT_GRPC_LISTEN
              value: 0.0.0.0:50051
            - name: DEVAULT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "devault.fullname" . }}-app
                  key: DEVAULT_DATABASE_URL
            - name: DEVAULT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "devault.fullname" . }}-app
                  key: DEVAULT_API_TOKEN
            - name: DEVAULT_GRPC_REGISTRATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "devault.fullname" . }}-app
                  key: DEVAULT_GRPC_REGISTRATION_SECRET
            - name: DEVAULT_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "devault.fullname" . }}-app
                  key: DEVAULT_S3_ACCESS_KEY
            - name: DEVAULT_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "devault.fullname" . }}-app
                  key: DEVAULT_S3_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
