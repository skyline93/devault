apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devault.fullname" . }}-app
  labels:
    {{- include "devault.labels" . | nindent 4 }}
type: Opaque
stringData:
  DEVAULT_DATABASE_URL: {{ include "devault.effectiveDatabaseUrl" . | quote }}
  DEVAULT_GRPC_REGISTRATION_SECRET: {{ .Values.secrets.grpcRegistrationSecret | quote }}
  DEVAULT_S3_ACCESS_KEY: {{ .Values.minio.rootUser | quote }}
  DEVAULT_S3_SECRET_KEY: {{ .Values.minio.rootPassword | quote }}
