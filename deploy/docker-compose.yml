services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devault
      POSTGRES_PASSWORD: devault
      POSTGRES_DB: devault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devault -d devault"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # One-shot: create bucket at deploy time (app never calls CreateBucket — enterprise IAM).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      DEVAULT_S3_BUCKET: ${DEVAULT_S3_BUCKET:-devault}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        i=0
        while [ "$$i" -lt 60 ]; do
          mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" && break
          i=$$((i+1))
          sleep 1
        done
        mc mb --ignore-existing "local/$$DEVAULT_S3_BUCKET"
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             uvicorn devault.api.main:app --host 0.0.0.0 --port 8000"
    environment:
      DEVAULT_DATABASE_URL: postgresql+psycopg://devault:devault@postgres:5432/devault
      DEVAULT_REDIS_URL: redis://redis:6379/0
      DEVAULT_API_TOKEN: ${DEVAULT_API_TOKEN:-changeme}
      DEVAULT_STORAGE_BACKEND: s3
      DEVAULT_S3_ENDPOINT: http://minio:9000
      DEVAULT_S3_ACCESS_KEY: minioadmin
      DEVAULT_S3_SECRET_KEY: minioadmin
      DEVAULT_S3_BUCKET: ${DEVAULT_S3_BUCKET:-devault}
      DEVAULT_S3_USE_SSL: "false"
      DEVAULT_ENV_NAME: dev
      DEVAULT_GRPC_LISTEN: 0.0.0.0:50051
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    # Uvicorn lifespan starts gRPC on :50051; wait until HTTP is up so Envoy/agents do not hit connection refused.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/healthz'', timeout=4).read()"',
        ]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 120s

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    # Do not run alembic here: api already runs `alembic upgrade head` on startup.
    # Concurrent migrations from multiple containers race on CREATE alembic_version.
    command: devault-scheduler
    environment:
      DEVAULT_DATABASE_URL: postgresql+psycopg://devault:devault@postgres:5432/devault
      DEVAULT_REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_healthy

  agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: devault-agent
    environment:
      DEVAULT_API_TOKEN: ${DEVAULT_API_TOKEN:-changeme}
      DEVAULT_GRPC_TARGET: api:50051
      DEVAULT_ALLOWED_PATH_PREFIXES: /data,/restore
      PYTHONPATH: /app/src
    volumes:
      - ../demo_data:/data:ro
      - agent_restore:/restore
    depends_on:
      api:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  pgdata: {}
  miniodata: {}
  agent_restore: {}
