# й»ҳи®ӨжҺ§еҲ¶йқўй•ңеғҸпјҡDocker Hub ``glf9832/devault``пјӣжң¬д»“еә“еңЁ ``api`` / ``scheduler`` / ``agent`` дёҠеЈ°жҳҺдәҶ ``build``пјҢ
# дҪҝз”Ё ``docker compose up --build`` ж—¶дјҡд»Һ ``deploy/Dockerfile`` жһ„е»әе№¶жү“дёҠ ``DEVAULT_IMAGE`` ж ҮзӯҫпјҲеҗ«жңҖж–° AlembicпјүгҖӮ
#
# ## ProfilesпјҲжҢүйңҖеҗҜз”Ёпјү
#
# ж—  profile ж—¶д»…еҗҜеҠЁ **еҶ…зҪ®ж•°жҚ®йқў**пјҡ``postgres``гҖҒ``redis``гҖҒ``minio``гҖҒ``minio-init``гҖӮ
#
# | Profile | жңҚеҠЎ |
# |---------|------|
# | **with-control-plane** | ``iam``гҖҒ``api``гҖҒ``scheduler``пјҲIAM дёҺ DeVault жҺ§еҲ¶йқўпјү |
# | **with-agent** | ``postgres-pgbr-demo``гҖҒ``pgbr-demo-init``гҖҒ``agent``гҖҒ``agent2``гҖҒ``demo-pgbr-policy-init``пјҲйЎ»дёҺжҺ§еҲ¶йқўеҗҢж—¶еҗҜз”ЁпјүпјӣдёҺ **with-console** д»»дёҖеҗҜз”Ёж—¶йғҪдјҡи·‘ ``demo-stack-init``пјҲIAMвҶ’DeVault з§ҹжҲ·й•ңеғҸпјӣ**with-agent** ж—¶иҝҳдјҡз»Ҹ HTTP зӯҫеҸ‘ **дёӨжқЎ** жј”зӨә Agent д»ӨзүҢеҶҷе…Ҙе…ұдә«еҚ·пјҢдҫӣдёӨдёӘиҫ№з«Ҝе®һдҫӢпјү |
# | **with-console** | ``demo-stack-init``гҖҒ``console``пјҲжј”зӨәз§ҹжҲ·й•ңеғҸ + е®ҳж–№ Web жҺ§еҲ¶еҸ°пјӣйңҖ **with-control-plane**пјү |
# | **with-grpc-tls** | ``grpc-gateway``пјҲEnvoy еҜ№еӨ– TLS :50052 вҶ’ ``api:50051``пјӣйңҖ **with-control-plane**пјү |
# | **with-monitoring** | ``alertdump``гҖҒ``alertmanager``гҖҒ``prometheus``пјҲйңҖ **with-control-plane** д»ҘдҫҝжҠ“еҸ– ``api``пјү |
#
# **Agent з»Ҹ TLS иҝһзҪ‘е…і**пјҡеҶҚеҸ еҠ  **``compose.include/grpc-tls-agent.yml``**пјҢжҲ– **``-f docker-compose.grpc-tls.yml``**пјҲд»… ``include`` дёҠиҝ°зүҮж®өпјүгҖӮ
#
# еёёз”ЁзӨәдҫӢпјҡ
#
#   # жҺ§еҲ¶йқў + иҠӮзӮ№ AgentпјҲж—  UIпјү
#   docker compose --profile with-control-plane --profile with-agent up -d
#
#   # е®Ңж•ҙжј”зӨәж ҲпјҲIAM + API + scheduler + agent + agent2 + жҺ§еҲ¶еҸ°пјү
#   docker compose --profile with-control-plane --profile with-agent --profile with-console up -d --build
#
# д»“еә“ж № **``make demo-stack-up``**пјҡжң¬ең°жһ„е»ә ``devault:local`` / ``devault-console:local`` е№¶еҗҜз”Ё **with-control-plane**гҖҒ**with-agent**гҖҒ**with-console**пјҲ**demo-stack-init** дјҡй•ңеғҸз§ҹжҲ·е№¶з»Ҹ HTTP зӯҫеҸ‘дёӨжқЎжј”зӨә Agent д»ӨзүҢеҶҷе…Ҙе…ұдә«еҚ·пјҢ**agent** / **agent2** еҗ„з”Ёе…¶дёҖпјҢдҫҝдәҺеӨҡе®һдҫӢйӘҢиҜҒпјүгҖӮ
#
# **with-console** жҲ– **with-agent** ж—¶пјҡ``demo-stack-init`` еңЁ ``api``/``iam`` еҒҘеә·еҗҺиҝҗиЎҢпјҲ**with-console** ж—¶ **Console** еңЁе…¶ **жҲҗеҠҹйҖҖеҮәеҗҺ** еҶҚеҗҜеҠЁпјүгҖӮ``IAM_DEMO_AUTO_BOOTSTRAP`` дёӢ **IAM** иҝҒз§»еҗҺе№Ӯзӯү ``iam-admin bootstrap``пјҲй»ҳи®Ө ``demo@devault.com`` / ``Devault12345``пјҢд»…жј”зӨәпјүгҖӮ
#
# жөҸи§ҲеҷЁпјҡ<http://127.0.0.1:8080/> жҺ§еҲ¶еҸ°пјӣ<http://127.0.0.1:8100/docs> IAMпјӣ<http://127.0.0.1:8000/docs> APIгҖӮ
# жҺ§еҲ¶йқў REST йЎ»еёҰ **``X-DeVault-Tenant-Id``**пјҲUUIDпјүпјӣж— й»ҳи®Ө slug еӣһиҗҪгҖӮиҰҶзӣ–й»ҳи®Өе№іеҸ°иҙҰеҸ·пјҡ**``DEMO_STACK_PLATFORM_EMAIL``** / **``DEMO_STACK_PLATFORM_PASSWORD``**пјҲи§Ғ **``deploy/.env.stack.example``**пјүгҖӮ
#
# Override: DEVAULT_IMAGE=registry.example.com/acme/devault:tag
# Playwright дё“з”Ёж Ҳпјҡ`docker compose -f deploy/docker-compose.console-e2e.yml up -d --build`
#
# PyPIпјҡй»ҳи®ӨйҳҝйҮҢдә‘й•ңеғҸе№¶еӨҚз”Ё BuildKit pip зј“еӯҳпјӣиҰҶзӣ–е®ҳж–№жәҗеҸҜи®ҫ **``export PIP_INDEX_URL=https://pypi.org/simple/``** еҗҺеҶҚ ``compose build``гҖӮ
#
# Remote agents (outside this compose network) need presigned S3 URLs they can reach. By default
# DEVAULT_S3_ENDPOINT is http://minio:9000 (in-stack only). Set in .env or the shell, e.g.:
#   DEVAULT_S3_ENDPOINT=http://192.168.1.10:9000
#   DEVAULT_S3_ENDPOINT=http://host.docker.internal:9000   # Docker Desktop: api reaches host-published :9000
# Use the same host:port from api, scheduler, and every agent. Minio already publishes 9000:9000.
#
# IAMпјҲprofile **with-control-plane**пјүпјҡдёҺжҺ§еҲ¶йқўе…ұз”Ё **postgres / redis**пјҲеҗҢдёҖ database `devault`пјҢиЎЁеүҚзјҖеҲҶеҲ«дёә **devault_*** / **iam_***пјӣRedis IAM дҪҝз”Ё **db 1**пјүгҖӮ`api` й»ҳи®Ө **DEVAULT_IAM_JWKS_URL=http://iam:8100/...**
# дёҺ **DEVAULT_IAM_JWT_ISSUER/AUDIENCE**пјҲдёҺ IAM й»ҳи®Ө `IAM_JWT_*` еҜ№йҪҗпјүпјҢеҗҜеҠЁеҗҺ HTTP иө° IAM JWT ж ЎйӘҢпјҲйқһ dev-openпјүгҖӮ
# жөҸи§ҲеҷЁи®ҝй—® IAMпјҡ**http://127.0.0.1:8100**пјӣissuer д»Қдёә **http://127.0.0.1:8100**пјҢдёҺд»ӨзүҢеҶ… `iss` дёҖиҮҙгҖӮз”ҹдә§еҸҜд»ҚдёәзӢ¬з«Ӣ Postgres/RedisпјҢд»…ж”№иҝһжҺҘдёІгҖӮ

x-pip-build-args: &pip-build-args
  PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}

services:
  iam:
    profiles: ["with-control-plane"]
    build:
      context: ../iam
      dockerfile: Dockerfile
      args:
        <<: *pip-build-args
    environment:
      IAM_DATABASE_URL: postgresql+psycopg://devault:devault@postgres:5432/devault
      IAM_REDIS_URL: redis://redis:6379/1
      IAM_JWT_ISSUER: ${IAM_JWT_ISSUER:-http://127.0.0.1:8100}
      IAM_JWT_AUDIENCE: ${IAM_JWT_AUDIENCE:-devault-api}
      # жј”зӨәж Ҳй»ҳи®Өе№іеҸ°е‘ҳпјҲдёҺ demo-stack-init дёҖиҮҙпјүпјӣз”ҹдә§йғЁзҪІиҜ·ж”№еҶҷжҲ–и®ҫ IAM_DEMO_AUTO_BOOTSTRAP=false
      IAM_DEMO_AUTO_BOOTSTRAP: ${IAM_DEMO_AUTO_BOOTSTRAP:-true}
      DEMO_STACK_PLATFORM_EMAIL: ${DEMO_STACK_PLATFORM_EMAIL:-demo@devault.com}
      DEMO_STACK_PLATFORM_PASSWORD: ${DEMO_STACK_PLATFORM_PASSWORD:-Devault12345}
    command:
      - sh
      - -c
      - |
        set -e
        alembic upgrade head
        if [ "$${IAM_DEMO_AUTO_BOOTSTRAP:-true}" = "true" ]; then
          printf '%s' "$${DEMO_STACK_PLATFORM_PASSWORD}" > /tmp/iam_demo_pw.txt
          iam-admin bootstrap create-platform-user --email "$${DEMO_STACK_PLATFORM_EMAIL}" --password-file /tmp/iam_demo_pw.txt || true
          rm -f /tmp/iam_demo_pw.txt
        fi
        exec uvicorn devault_iam.api.main:app --host 0.0.0.0 --port 8100
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8100/health'', timeout=4).read()"',
        ]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 90s

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: devault
      POSTGRES_PASSWORD: devault
      POSTGRES_DB: devault
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devault -d devault"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # One-shot: create bucket at deploy time (app never calls CreateBucket вҖ” enterprise IAM).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      DEVAULT_S3_BUCKET: ${DEVAULT_S3_BUCKET:-devault}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        i=0
        while [ "$$i" -lt 60 ]; do
          mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" && break
          i=$$((i+1))
          sleep 1
        done
        mc mb --ignore-existing "local/$$DEVAULT_S3_BUCKET"
    restart: "no"

  # pgBackRest *target* Postgres (not the devault metadata DB). Compose-only trust auth вҖ” do not copy to production.
  postgres-pgbr-demo:
    profiles: ["with-agent"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.postgres-pgbr-demo
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devault-pgbr-pass
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 3s
      timeout: 5s
      retries: 30

  # One-shot: pgBackRest stanza on MinIO for demo stanza name (default ``demo``).
  pgbr-demo-init:
    profiles: ["with-agent"]
    image: ${DEVAULT_IMAGE:-glf9832/devault:latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        <<: *pip-build-args
    environment:
      DEVAULT_S3_BUCKET: ${DEVAULT_S3_BUCKET:-devault}
      DEMO_PGBR_STANZA: ${DEMO_PGBR_STANZA:-demo}
      DEMO_PGBR_PG_HOST: postgres-pgbr-demo
      DEMO_PGBR_S3_ENDPOINT: ${DEVAULT_S3_ENDPOINT:-http://minio:9000}
      PGBACKREST_REPO1_S3_KEY: minioadmin
      PGBACKREST_REPO1_S3_KEY_SECRET: minioadmin
    entrypoint: ["/bin/sh", "/app/deploy/scripts/pgbackrest_demo_stanza_init.sh"]
    volumes:
      - ./pgbr-demo/id_ed25519:/root/.ssh/pgbr_demo_ed25519:ro
      - ./pgbr-demo/ssh_config:/root/.ssh/config:ro
    depends_on:
      postgres-pgbr-demo:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: "no"

  api:
    profiles: ["with-control-plane"]
    image: ${DEVAULT_IMAGE:-glf9832/devault:latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        <<: *pip-build-args
    command: >
      sh -c "alembic upgrade head &&
             uvicorn devault.api.main:app --host 0.0.0.0 --port 8000"
    environment:
      DEVAULT_DATABASE_URL: postgresql+psycopg://devault:devault@postgres:5432/devault
      DEVAULT_REDIS_URL: redis://redis:6379/0
      # IAM JWTпјҲдёҺеҶ…еөҢ `iam` жңҚеҠЎдёҖиҮҙпјӣиҰҶзӣ– issuer/audience ж—¶иҜ·еҗҢжӯҘ IAM зҺҜеўғеҸҳйҮҸпјү
      DEVAULT_IAM_JWT_ISSUER: ${DEVAULT_IAM_JWT_ISSUER:-http://127.0.0.1:8100}
      DEVAULT_IAM_JWT_AUDIENCE: ${DEVAULT_IAM_JWT_AUDIENCE:-devault-api}
      DEVAULT_IAM_JWKS_URL: ${DEVAULT_IAM_JWKS_URL:-http://iam:8100/.well-known/jwks.json}
      # Enables Agent Register bootstrap; must match agent service below (dev-only default).
      DEVAULT_GRPC_REGISTRATION_SECRET: ${DEVAULT_GRPC_REGISTRATION_SECRET:-devault-docker-register-secret}
      DEVAULT_STORAGE_BACKEND: s3
      DEVAULT_S3_ENDPOINT: ${DEVAULT_S3_ENDPOINT:-http://minio:9000}
      DEVAULT_S3_ACCESS_KEY: minioadmin
      DEVAULT_S3_SECRET_KEY: minioadmin
      DEVAULT_S3_BUCKET: ${DEVAULT_S3_BUCKET:-devault}
      DEVAULT_S3_USE_SSL: "false"
      DEVAULT_ENV_NAME: dev
      DEVAULT_GRPC_LISTEN: 0.0.0.0:50051
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      iam:
        condition: service_healthy
    # Uvicorn lifespan starts gRPC on :50051; wait until HTTP is up so Envoy/agents do not hit connection refused.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/healthz'', timeout=4).read()"',
        ]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 120s

  scheduler:
    profiles: ["with-control-plane"]
    image: ${DEVAULT_IMAGE:-glf9832/devault:latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        <<: *pip-build-args
    # Do not run alembic here: api already runs `alembic upgrade head` on startup.
    # Concurrent migrations from multiple containers race on CREATE devault_alembic_version.
    command: devault-scheduler
    environment:
      DEVAULT_DATABASE_URL: postgresql+psycopg://devault:devault@postgres:5432/devault
      DEVAULT_REDIS_URL: redis://redis:6379/0
      # Same storage as api for retention purge (delete bundle + manifest)
      DEVAULT_STORAGE_BACKEND: s3
      DEVAULT_S3_ENDPOINT: ${DEVAULT_S3_ENDPOINT:-http://minio:9000}
      DEVAULT_S3_ACCESS_KEY: minioadmin
      DEVAULT_S3_SECRET_KEY: minioadmin
      DEVAULT_S3_BUCKET: ${DEVAULT_S3_BUCKET:-devault}
      DEVAULT_S3_USE_SSL: "false"
      DEVAULT_ENV_NAME: dev
      DEVAULT_RETENTION_CLEANUP_ENABLED: "true"
      DEVAULT_RETENTION_CLEANUP_INTERVAL_SECONDS: "900"
      PYTHONPATH: /app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_healthy

  # Agent performs bundle encryption before upload and decryption on restore when the policy has
  # encrypt_artifacts=true. Only the Agent needs DEVAULT_ARTIFACT_ENCRYPTION_KEY (control plane does not).
  #
  # Default below: fixed Base64 for dev/demo ONLY вҖ” predictable, NOT secret. Replace in any shared or
  # production-like environment; override via shell or a .env next to this file, e.g.
  #   export DEVAULT_ARTIFACT_ENCRYPTION_KEY="$(openssl rand -base64 32)"
  # Format: standard Base64 decoding to exactly 32 bytes (AES-256). See website/docs/security/artifact-encryption.md
  #
  # Auth: default uses ``demo-stack-init`` вҶ’ ``POST /api/v1/agent-tokens`` (two tokens) + shared volume; override ``DEVAULT_AGENT_TOKEN`` / ``DEVAULT_AGENT2_TOKEN`` in ``.env`` for non-demo.
  agent:
    profiles: ["with-agent"]
    image: ${DEVAULT_IMAGE:-glf9832/devault:latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        <<: *pip-build-args
    command: ["/bin/sh", "/app/deploy/scripts/devault-agent-docker-entry.sh"]
    environment:
      DEVAULT_AGENT_TOKEN: ${DEVAULT_AGENT_TOKEN:-}
      DEVAULT_AGENT_TOKEN_FILE: ${DEVAULT_AGENT_TOKEN_FILE:-/shared/demo-agent-token}
      DEVAULT_GRPC_TARGET: api:50051
      DEVAULT_ALLOWED_PATH_PREFIXES: /data,/restore
      # Dev/demo default key (literal label: devault-docker-demo-aes256-key!!); override for real use.
      DEVAULT_ARTIFACT_ENCRYPTION_KEY: ${DEVAULT_ARTIFACT_ENCRYPTION_KEY:-ZGV2YXVsdC1kb2NrZXItZGVtby1hZXMyNTYta2V5ISE=}
      PYTHONPATH: /app/src
      # pgBackRest вҶ’ MinIO (non-secret repo fields also in policy JSON; keys from env only).
      DEVAULT_S3_BUCKET: ${DEVAULT_S3_BUCKET:-devault}
      PGBACKREST_REPO1_S3_KEY: minioadmin
      PGBACKREST_REPO1_S3_KEY_SECRET: minioadmin
      PGSSLMODE: disable
    volumes:
      - ./demo_data:/data:ro
      - agent_restore:/restore
      - demo_stack_secrets:/shared:ro
      - ./pgbr-demo/id_ed25519:/root/.ssh/pgbr_demo_ed25519:ro
      - ./pgbr-demo/ssh_config:/root/.ssh/config:ro
    depends_on:
      api:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      pgbr-demo-init:
        condition: service_completed_successfully
      demo-stack-init:
        condition: service_completed_successfully

  # Second demo Agent (distinct token вҶ’ distinct ``agent_id`` after Register); separate ``/restore`` volume.
  agent2:
    profiles: ["with-agent"]
    image: ${DEVAULT_IMAGE:-glf9832/devault:latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        <<: *pip-build-args
    command: ["/bin/sh", "/app/deploy/scripts/devault-agent-docker-entry.sh"]
    environment:
      DEVAULT_AGENT_TOKEN: ${DEVAULT_AGENT2_TOKEN:-}
      DEVAULT_AGENT_TOKEN_FILE: ${DEVAULT_AGENT2_TOKEN_FILE:-/shared/demo-agent-token-2}
      DEVAULT_GRPC_TARGET: api:50051
      DEVAULT_ALLOWED_PATH_PREFIXES: /data,/restore
      DEVAULT_ARTIFACT_ENCRYPTION_KEY: ${DEVAULT_ARTIFACT_ENCRYPTION_KEY:-ZGV2YXVsdC1kb2NrZXItZGVtby1hZXMyNTYta2V5ISE=}
      PYTHONPATH: /app/src
      # pgBackRest вҶ’ MinIO (non-secret repo fields also in policy JSON; keys from env only).
      DEVAULT_S3_BUCKET: ${DEVAULT_S3_BUCKET:-devault}
      PGBACKREST_REPO1_S3_KEY: minioadmin
      PGBACKREST_REPO1_S3_KEY_SECRET: minioadmin
      PGSSLMODE: disable
    volumes:
      - ./demo_data:/data:ro
      - agent2_restore:/restore
      - demo_stack_secrets:/shared:ro
      - ./pgbr-demo/id_ed25519:/root/.ssh/pgbr_demo_ed25519:ro
      - ./pgbr-demo/ssh_config:/root/.ssh/config:ro
    depends_on:
      api:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      pgbr-demo-init:
        condition: service_completed_successfully
      demo-stack-init:
        condition: service_completed_successfully

  # **with-console**пјҲйңҖеҗҢж—¶еҗҜз”Ё **with-control-plane**пјүпјҡе…Ҳ **demo-stack-init**пјҲIAM ``demo`` вҶ’ DeVaultпјүпјҢеҶҚ **console**пјҲAnt Design ProпјҢеҸҚд»Ј API / IAMпјүгҖӮ
  # жһ„е»ә consoleпјҡ`docker compose --profile with-control-plane --profile with-console build console`пјӣи®ҝй—® <http://127.0.0.1:8080/>пјӣ**DEVAULT_CONSOLE_*_UPSTREAM** / **UMI_APP_IAM_PREFIX**пјӣ**UMI_APP_AUTH_DEBUG** й»ҳи®Ө **1**гҖӮ
  demo-stack-init:
    profiles: ["with-console", "with-agent"]
    image: ${DEVAULT_IMAGE:-glf9832/devault:latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        <<: *pip-build-args
    environment:
      DEMO_STACK_IAM_BASE: ${DEMO_STACK_IAM_BASE:-http://iam:8100}
      DEMO_STACK_DEVAULT_API: ${DEMO_STACK_DEVAULT_API:-http://api:8000}
      DEMO_STACK_PLATFORM_EMAIL: ${DEMO_STACK_PLATFORM_EMAIL:-demo@devault.com}
      DEMO_STACK_PLATFORM_PASSWORD: ${DEMO_STACK_PLATFORM_PASSWORD:-Devault12345}
      DEMO_STACK_TENANT_SLUG: ${DEMO_STACK_TENANT_SLUG:-demo}
      DEMO_STACK_TENANT_NAME: ${DEMO_STACK_TENANT_NAME:-Demo}
      DEMO_STACK_AGENT_TOKEN_FILE: ${DEMO_STACK_AGENT_TOKEN_FILE:-/shared/demo-agent-token}
      DEMO_STACK_AGENT_TOKEN_LABEL: ${DEMO_STACK_AGENT_TOKEN_LABEL:-demo-stack-agent}
      DEMO_STACK_AGENT2_TOKEN_FILE: ${DEMO_STACK_AGENT2_TOKEN_FILE:-/shared/demo-agent-token-2}
      DEMO_STACK_AGENT2_TOKEN_LABEL: ${DEMO_STACK_AGENT2_TOKEN_LABEL:-demo-stack-agent-2}
      DEMO_STACK_SKIP_AGENT_TOKEN_BOOTSTRAP: ${DEMO_STACK_SKIP_AGENT_TOKEN_BOOTSTRAP:-false}
      PYTHONPATH: /app/src
    volumes:
      - demo_stack_secrets:/shared
    entrypoint: ["python3", "/app/deploy/scripts/bootstrap_demo_stack.py"]
    depends_on:
      api:
        condition: service_healthy
      iam:
        condition: service_healthy
    restart: "no"

  # One-shot: after both Agents start, create ``demo-pgbackrest`` policy (bound to agent2 by default).
  demo-pgbr-policy-init:
    profiles: ["with-agent"]
    image: ${DEVAULT_IMAGE:-glf9832/devault:latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        <<: *pip-build-args
    environment:
      DEMO_STACK_PGBR_ENABLED: ${DEMO_STACK_PGBR_ENABLED:-true}
      DEMO_STACK_PGBR_MIN_AGENTS: ${DEMO_STACK_PGBR_MIN_AGENTS:-2}
      DEMO_STACK_PGBR_AGENT_INDEX: ${DEMO_STACK_PGBR_AGENT_INDEX:-1}
      DEMO_STACK_IAM_BASE: ${DEMO_STACK_IAM_BASE:-http://iam:8100}
      DEMO_STACK_DEVAULT_API: ${DEMO_STACK_DEVAULT_API:-http://api:8000}
      DEMO_STACK_PLATFORM_EMAIL: ${DEMO_STACK_PLATFORM_EMAIL:-demo@devault.com}
      DEMO_STACK_PLATFORM_PASSWORD: ${DEMO_STACK_PLATFORM_PASSWORD:-Devault12345}
      DEMO_STACK_TENANT_SLUG: ${DEMO_STACK_TENANT_SLUG:-demo}
      DEMO_STACK_PGBR_POLICY_NAME: ${DEMO_STACK_PGBR_POLICY_NAME:-demo-pgbackrest}
      DEVAULT_S3_BUCKET: ${DEVAULT_S3_BUCKET:-devault}
      DEMO_PGBR_S3_ENDPOINT: ${DEVAULT_S3_ENDPOINT:-http://minio:9000}
      PYTHONPATH: /app/src
    entrypoint: ["python3", "/app/deploy/scripts/bootstrap_pgbr_demo_policy.py"]
    depends_on:
      api:
        condition: service_healthy
      iam:
        condition: service_healthy
      demo-stack-init:
        condition: service_completed_successfully
      agent:
        condition: service_started
      agent2:
        condition: service_started
    restart: "no"

  console:
    profiles: ["with-console"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.console
      args:
        <<: *pip-build-args
        UMI_APP_ENV_LABEL: ${UMI_APP_ENV_LABEL:-}
        UMI_APP_GRAFANA_URL: ${UMI_APP_GRAFANA_URL:-}
        UMI_APP_IAM_PREFIX: ${UMI_APP_IAM_PREFIX:-/iam-api}
        UMI_APP_AUTH_DEBUG: ${UMI_APP_AUTH_DEBUG:-1}
    image: ${DEVAULT_CONSOLE_IMAGE:-devault-console:local}
    environment:
      DEVAULT_CONSOLE_API_UPSTREAM: ${DEVAULT_CONSOLE_API_UPSTREAM:-api:8000}
      DEVAULT_CONSOLE_IAM_UPSTREAM: ${DEVAULT_CONSOLE_IAM_UPSTREAM:-iam:8100}
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
      iam:
        condition: service_healthy
      demo-stack-init:
        condition: service_completed_successfully

  # Envoy TLS з»Ҳз»“пјҲ:50052пјүвҶ’ еҶ…зҪ‘жҳҺж–Ү gRPC ``api:50051``гҖӮиҜҒд№Ұпјҡд»“еә“ж № ``bash scripts/gen_grpc_dev_tls.sh`` вҶ’ ``deploy/tls/dev/``гҖӮ
  grpc-gateway:
    profiles: ["with-grpc-tls"]
    image: envoyproxy/envoy:v1.31.0
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    volumes:
      - ./envoy/envoy-grpc-tls.yaml:/etc/envoy/envoy.yaml:ro
      - ./tls/dev/server.crt:/etc/ssl/grpc/server.crt:ro
      - ./tls/dev/server.key:/etc/ssl/grpc/server.key:ro
    ports:
      - "50052:50052"
      - "9901:9901"
    depends_on:
      api:
        condition: service_healthy

  alertdump:
    profiles: ["with-monitoring"]
    image: mendhak/http-https-echo:35
    expose:
      - "8080"

  alertmanager:
    profiles: ["with-monitoring"]
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --web.external-url=http://127.0.0.1:9093
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    depends_on:
      alertdump:
        condition: service_started

  prometheus:
    profiles: ["with-monitoring"]
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      api:
        condition: service_healthy
      alertmanager:
        condition: service_started

volumes:
  pgdata: {}
  miniodata: {}
  agent_restore: {}
  agent2_restore: {}
  demo_stack_secrets: {}
