# DeVault local stack: scrape the control-plane HTTP /metrics endpoint.
# Used by optional overlay: deploy/docker-compose.prometheus.yml
# rule_files references deploy/prometheus/alerts.yml — copy both files (or adjust paths) if you reuse this config outside Compose.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: devault-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000
