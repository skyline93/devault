# Optional stack: IAM only (separate Postgres DB). From repo root:
#   docker compose -f deploy/docker-compose.iam.yml up --build
#
# IAM API: http://127.0.0.1:8100/health  ·  DB: localhost:5433 (iam/iam)

services:
  postgres-iam:
    image: postgres:14
    environment:
      POSTGRES_USER: iam
      POSTGRES_PASSWORD: iam
      POSTGRES_DB: iam
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam -d iam"]
      interval: 3s
      timeout: 5s
      retries: 20

  iam:
    build:
      context: ../iam
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             uvicorn devault_iam.api.main:app --host 0.0.0.0 --port 8100"
    environment:
      IAM_DATABASE_URL: postgresql+psycopg://iam:iam@postgres-iam:5432/iam
      IAM_REDIS_URL: redis://redis-iam:6379/0
    ports:
      - "8100:8100"
    depends_on:
      postgres-iam:
        condition: service_healthy
      redis-iam:
        condition: service_started

  redis-iam:
    image: redis:7
    ports:
      - "6380:6379"
