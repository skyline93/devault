# Optional stack: IAM only（与主栈相同：单 Postgres + 单 Redis；库名 `devault`，IAM 表前缀 **iam_**）。
# From repo root:
#   docker compose -f deploy/docker-compose.iam.yml up --build
#
# IAM API: http://127.0.0.1:8100/health  ·  DB: localhost:5432（devault/devault）

x-pip-build-args: &pip-build-args
  PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: devault
      POSTGRES_PASSWORD: devault
      POSTGRES_DB: devault
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devault -d devault"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  iam:
    build:
      context: ../iam
      dockerfile: Dockerfile
      args:
        <<: *pip-build-args
    command: >
      sh -c "alembic upgrade head &&
             uvicorn devault_iam.api.main:app --host 0.0.0.0 --port 8100"
    environment:
      IAM_DATABASE_URL: postgresql+psycopg://devault:devault@postgres:5432/devault
      IAM_REDIS_URL: redis://redis:6379/0
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
