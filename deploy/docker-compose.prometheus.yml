# Optional: Prometheus + Alertmanager + demo webhook sink (echo HTTP server).
# From repo root:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.prometheus.yml up -d
# From deploy/:
#   docker compose -f docker-compose.yml -f docker-compose.prometheus.yml up -d
#
# UIs: Prometheus http://localhost:9090 — Alertmanager http://localhost:9093
# Demo alerts POST to alertdump; view payloads: docker compose -f ... logs -f alertdump

services:
  alertdump:
    image: mendhak/http-https-echo:35
    expose:
      - "8080"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --web.external-url=http://127.0.0.1:9093
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    depends_on:
      alertdump:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      api:
        condition: service_healthy
      alertmanager:
        condition: service_started
